<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>✨ Memories ✨</title>
</head>
<body style="background-color: #e2f4f1; background-image: radial-gradient(#ffffff 20%, transparent 20%), radial-gradient(#ffffff 20%, transparent 20%); background-size: 20px 20px; background-position: 0 0, 10px 10px; min-height: 100vh; margin: 0; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif;">

    <h1 style="color: #ff6b8b; text-align: center; font-size: 38px; font-weight: 900; margin: 25px 0 12px 0; text-shadow: 2px 2px 0px #ffffff; letter-spacing: 2px;">✨ Memories ✨</h1>
    <div style="background: rgba(255, 255, 255, 0.5); width: 150px; height: 12px; border-radius: 10px; margin-bottom: 35px;"></div>

    <div style="background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); border-radius: 28px; padding: 35px; max-width: 580px; width: 100%; box-shadow: 0 15px 45px rgba(162, 210, 203, 0.4); box-sizing: border-box; margin-bottom: 40px;">
        
        <h3 style="color: #d94663; margin-top: 0; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 1px; margin-bottom: 25px;">✍️ 记录我的线下行程</h3>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 17px; color: #444; margin-bottom: 8px; font-weight: bold;">📅 选择日期与城市</label>
            <input type="text" id="input-date" placeholder="例如：2026.03.06 · 首尔" style="width: 100%; padding: 14px; border: 2.5px solid #bfe3dd; border-radius: 14px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 16px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 17px; color: #444; margin-bottom: 8px; font-weight: bold;">🎵 Group</label>
            <input type="text" id="input-group" placeholder="今天去看哪个团呀？" style="width: 100%; padding: 14px; border: 2.5px solid #bfe3dd; border-radius: 14px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 16px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 17px; color: #444; margin-bottom: 8px; font-weight: bold;">👗 今日 OOTD</label>
            <input type="text" id="input-ootd" placeholder="今天穿了什么漂亮衣服？" style="width: 100%; padding: 14px; border: 2.5px solid #bfe3dd; border-radius: 14px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 16px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 17px; color: #444; margin-bottom: 8px; font-weight: bold;">✈️ 场馆 / 交通方式</label>
            <input type="text" id="input-transport" placeholder="盛满爱意的地方是哪里？" style="width: 100%; padding: 14px; border: 2.5px solid #bfe3dd; border-radius: 14px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 16px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 17px; color: #444; margin-bottom: 8px; font-weight: bold;">🛏️ 酒店/民宿</label>
            <input type="text" id="input-hotel" placeholder="这次线下住在哪里了呀？" style="width: 100%; padding: 14px; border: 2.5px solid #bfe3dd; border-radius: 14px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 16px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 17px; color: #444; margin-bottom: 8px; font-weight: bold;">🎤 最喜欢/感动的舞台</label>
            <textarea id="input-stage" placeholder="哪个舞台让你想要流泪？" style="width: 100%; padding: 14px; border: 2.5px solid #bfe3dd; border-radius: 14px; box-sizing: border-box; outline: none; height: 85px; resize: none; background-color: #fafafa; font-family: inherit; font-size: 16px;"></textarea>
        </div>
        
        <div style="margin-bottom: 30px;">
            <label style="display: block; font-size: 17px; color: #444; margin-bottom: 8px; font-weight: bold;">🍕 这一天吃了什么呀</label>
            <input type="text" id="input-food" placeholder="今天吃了什么好吃的？" style="width: 100%; padding: 14px; border: 2.5px solid #bfe3dd; border-radius: 14px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 16px;">
        </div>
