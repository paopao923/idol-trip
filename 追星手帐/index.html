<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>✨ Memories ✨</title>
</head>
<body style="background-color: #e2f4f1; background-image: radial-gradient(#ffffff 20%, transparent 20%), radial-gradient(#ffffff 20%, transparent 20%); background-size: 20px 20px; background-position: 0 0, 10px 10px; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif;">

    <h1 style="color: #ff6b8b; text-align: center; font-size: 32px; font-weight: 900; margin: 20px 0 10px 0; text-shadow: 2px 2px 0px #ffffff; letter-spacing: 2px;">✨ Memories ✨</h1>
    <div style="background: rgba(255, 255, 255, 0.5); width: 120px; height: 10px; border-radius: 10px; margin-bottom: 25px;"></div>

    <div style="background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); border-radius: 24px; padding: 25px; max-width: 450px; width: 100%; box-shadow: 0 12px 35px rgba(162, 210, 203, 0.4); box-sizing: border-box; margin-bottom: 30px;">
        
        <h3 style="color: #d94663; margin-top: 0; text-align: center; font-size: 19px; font-weight: bold; letter-spacing: 1px;">✍️ 记录我的线下行程</h3>
        
        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold;">📅 选择日期与城市</label>
            <input type="text" id="input-date" placeholder="例如：2026.03.06 · 首尔" style="width: 100%; padding: 10px; border: 2px solid #bfe3dd; border-radius: 12px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 14px;">
        </div>

        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold;">🎵 Group</label>
            <input type="text" id="input-group" placeholder="今天去看哪个团呀？" style="width: 100%; padding: 10px; border: 2px solid #bfe3dd; border-radius: 12px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 14px;">
        </div>
        
        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold;">👗 今日 OOTD</label>
            <input type="text" id="input-ootd" placeholder="今天穿了什么漂亮衣服？" style="width: 100%; padding: 10px; border: 2px solid #bfe3dd; border-radius: 12px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 14px;">
        </div>
        
        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold;">✈️ 场馆 / 交通方式</label>
            <input type="text" id="input-transport" placeholder="盛满爱意的地方是哪里？" style="width: 100%; padding: 10px; border: 2px solid #bfe3dd; border-radius: 12px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 14px;">
        </div>

        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold;">🛏️ 酒店/民宿</label>
            <input type="text" id="input-hotel" placeholder="这次线下住在哪里了呀？" style="width: 100%; padding: 10px; border: 2px solid #bfe3dd; border-radius: 12px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 14px;">
        </div>
        
        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold;">🎤 最喜欢/感动的舞台</label>
            <textarea id="input-stage" placeholder="哪个舞台让你想要流泪？" style="width: 100%; padding: 10px; border: 2px solid #bfe3dd; border-radius: 12px; box-sizing: border-box; outline: none; height: 65px; resize: none; background-color: #fafafa; font-family: inherit; font-size: 14px;"></textarea>
        </div>
        
        <div style="margin-bottom: 22px;">
            <label style="display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: bold;">🍕 这一天吃了什么呀</label>
            <input type="text" id="input-food" placeholder="今天吃了什么好吃的？" style="width: 100%; padding: 10px; border: 2px solid #bfe3dd; border-radius: 12px; box-sizing: border-box; outline: none; background-color: #fafafa; font-family: inherit; font-size: 14px;">
        </div>
        
        <button onclick="addRecord()" style="width: 100%; background-color: #ff6b81; color: white; border: none; padding: 13px; border-radius: 14px; font-size: 16px; cursor: pointer; font-weight: bold; transition: transform 0.1s, background 0.3s; box-shadow: 0 5px 12px rgba(255, 107, 129, 0.3); font-family: inherit; letter-spacing: 1px;">✨ 封存这段美好回忆 ✨</button>

    </div>

    <div id="records-container" style="width: 100%; max-width: 450px; box-sizing: border-box;"></div>

    <script>
        window.onload = function() {
            displayRecords();
        }

        function addRecord() {
            const date = document.getElementById('input-date').value;
            const group = document.getElementById('input-group').value;
            const ootd = document.getElementById('input-ootd').value;
            const transport = document.getElementById('input-transport').value;
            const hotel = document.getElementById('input-hotel').value;
            const stage = document.getElementById('input-stage').value;
            const food = document.getElementById('input-food').value;

            if (date.trim() === "") {
                alert("先写上亮闪闪的日期和城市吧！✨");
                return;
            }

            const newRecord = { date, group, ootd, transport, hotel, stage, food };

            let records = JSON.parse(localStorage.getItem('myIdolRecords')) || [];
            records.unshift(newRecord);
            localStorage.setItem('myIdolRecords', JSON.stringify(records));

            displayRecords();
            clearInputs();
        }

        function displayRecords() {
            const records = JSON.parse(localStorage.getItem('myIdolRecords')) || [];
            const container = document.getElementById('records-container');
            
            container.innerHTML = ""; 

            records.forEach(record => {
                const cardHTML = `
                    <div style="background-color: #ffffff; border: 2.5px solid #bfe3dd; border-radius: 20px; padding: 20px; width: 100%; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(162, 210, 203, 0.2); font-family: inherit; animation: popIn 0.3s ease; box-sizing: border-box;">
                        <h3 style="color: #d94663; margin-top: 0; font-size: 18px; font-weight: bold;">📅 ${record.date}</h3>
                        <hr style="border: 0; border-top: 2px dashed #bfe3dd; margin: 12px 0;">
                        <p style="font-size: 14px; margin: 10px 0; color: #444; line-height: 1.5;"><strong style="color: #2cb5a0; font-weight: bold;">🎵 追团对象：</strong>${record.group || '未记录'}</p>
                        <p style="font-size: 14px; margin: 10px 0; color: #444; line-height: 1.5;"><strong style="color: #2cb5a0; font-weight: bold;">👗 今日 OOTD：</strong>${record.ootd || '未记录'}</p>
                        <p style="font-size: 14px; margin: 10px 0; color: #444; line-height: 1.5;"><strong style="color: #2cb5a0; font-weight: bold;">✈️ 交通/场馆：</strong>${record.transport || '未记录'}</p>
                        <p style="font-size: 14px; margin: 10px 0; color: #444; line-height: 1.5;"><strong style="color: #2cb5a0; font-weight: bold;">🛏️ 住宿地点：</strong>${record.hotel || '未记录'}</p>
                        <p style="font-size: 14px; margin: 10px 0; color: #444; line-height: 1.5;"><strong style="color: #2cb5a0; font-weight: bold;">🎤 神仙舞台：</strong>${record.stage || '未记录'}</p>
                        <p style="font-size: 14px; margin: 10px 0; color: #444; line-height: 1.5;"><strong style="color: #2cb5a0; font-weight: bold;">🍕 限定美食：</strong>${record.food || '未记录'}</p>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function clearInputs() {
            document.getElementById('input-date').value = '';
            document.getElementById('input-group').value = '';
            document.getElementById('input-ootd').value = '';
            document.getElementById('input-transport').value = '';
            document.getElementById('input-hotel').value = '';
            document.getElementById('input-stage').value = '';
            document.getElementById('input-food').value = '';
        }
    </script>

    <style>
        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</body>
</html>
